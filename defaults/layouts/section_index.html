{{<base}}
{{$content}}
<main>
  <h1>{{page_title}}</h1>
  {{&body}}
  {{#posts | group_by year}}
  <section>
    <h2>{{key}}</h2>
    <ul>
      {{#items}} <li><a href="{{permalink}}">{{&title}}</a><span>{{#date_iso}}<time
            datetime="{{date_iso}}">{{date_display}}</time>{{/date_iso}}</span>
      </li>
      {{/items}}
    </ul>
  </section>
  {{/posts}}
</main>
{{/content}}
{{/base}}
